<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accedi</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <span class="navbar__logo">Capolavoro 2025/2026</span>
    <ul class="navbar__links">
      <li><a href="home.html">Home</a></li>
      <li><a href="registrazione.html">Registrati</a></li>
      <li><a href="login.html" class="active">Accedi</a></li>
      <li><a href="areaPrivata.php">Area Privata</a></li>
    </ul>
  </nav>

  <main class="page auth-page">
    <div class="auth-card">

      <h1 class="auth-card__title">Bentornato</h1>
      <p class="auth-card__sub">Accedi per visualizzare l'area riservata.</p>

      <form id="form-login" method="POST" action="login.php" novalidate>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email"
                 placeholder="La tua email" autocomplete="email" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password"
                 placeholder="La tua password" autocomplete="current-password" required />
        </div>

        <button type="submit" class="btn btn--primary btn--full">
          Accedi
        </button>

        <p class="form-footer">
          Non hai ancora un account? <a href="registrazione.html">Registrati</a>
        </p>

      </form>
    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
