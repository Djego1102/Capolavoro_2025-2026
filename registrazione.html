<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrazione</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <span class="navbar__logo">Capolavoro 2025/2026</span>
    <ul class="navbar__links">
      <li><a href="home.html">Home</a></li>
      <li><a href="registrazione.html" class="active">Registrati</a></li>
      <li><a href="login.html">Accedi</a></li>
      <li><a href="areaPrivata.php">Area Privata</a></li>
    </ul>
  </nav>

  <main class="page auth-page">
    <div class="auth-card">

      <h1 class="auth-card__title">Crea un account</h1>
      <p class="auth-card__sub">Registrati per accedere all'area riservata.</p>

      <form id="form-registrazione" method="POST" action="registrazione.php" novalidate>

        <div class="form-row">
          <div class="form-group">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome"
                   placeholder="Inserisci nome" autocomplete="given-name" required />
          </div>
          <div class="form-group">
            <label for="cognome">Cognome</label>
            <input type="text" id="cognome" name="cognome"
                   placeholder="Inserisci cognome" autocomplete="family-name" required />
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email"
                 placeholder="Inserisci email" autocomplete="email" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password"
                 placeholder="Almeno 8 caratteri" autocomplete="new-password" required />
        </div>

        <div class="form-group">
          <label for="conferma">Conferma password</label>
          <input type="password" id="conferma" name="conferma"
                 placeholder="Ripeti la password" autocomplete="new-password" required />
        </div>

        <button type="submit" class="btn btn--primary btn--full">
          Crea account
        </button>

        <p class="form-footer">
          Hai già un account? <a href="login.html">Accedi</a>
        </p>

      </form>
    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
